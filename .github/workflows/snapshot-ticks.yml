name: snapshot-ticks

# Intraday price ticks. Runs every 15 min during US RTH on weekdays.
# The schedule below covers EDT and EST both.
#
# Requires repository secrets:
#   APP_URL       — e.g. https://cimg-portfolio.vercel.app (no trailing slash,
#                   must be https://, no trailing path)
#   CRON_SECRET   — matches CRON_SECRET in the Vercel environment

on:
  schedule:
    - cron: "*/15 13-21 * * 1-5"
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger tick endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # -L follows redirects so trailing-slash or http→https rewrites
          # don't silently return a redirect page and skip the actual work.
          # -w prints the final HTTP status on its own line for logs.
          response=$(curl --fail --show-error --silent -L \
               --max-time 60 \
               -w "\nHTTP %{http_code}\n" \
               -X POST "$APP_URL/api/cron/tick" \
               -H "Authorization: Bearer $CRON_SECRET")
          echo "$response"
